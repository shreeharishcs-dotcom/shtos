<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shreehari Total Online Solution — Billing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --navy: #0d2149;
    --navy-deep: #081530;
    --gold: #c9a227;
    --gold-light: #e6c352;
    --cream: #f8f6ef;
    --ink: #1b2436;
    --muted: #6b7280;
    --paid: #1e7a4c;
    --pending: #b23b2e;
    --partial: #b8860b;
    --card-radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--cream);
    color: var(--ink);
  }
  h1,h2,h3 { font-family: Georgia, "Times New Roman", serif; margin: 0; }
  .hidden { display: none !important; }

  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 20%, #17306b 0%, var(--navy-deep) 70%);
    padding: 24px;
  }
  .login-card {
    background: var(--cream);
    border-radius: 16px;
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    border: 2px solid var(--gold);
  }
  .login-card img { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 10px; }
  .login-card h1 { color: var(--navy); font-size: 22px; letter-spacing: 0.5px; }
  .login-card .tagline { color: var(--gold); font-size: 12.5px; letter-spacing: 1.5px; text-transform: uppercase; margin: 4px 0 22px; }
  .login-card input {
    width: 100%; padding: 12px 14px; font-size: 18px; letter-spacing: 4px;
    text-align: center; border: 1.5px solid #cfcabb; border-radius: 8px; margin-bottom: 14px;
    background: #fff;
  }
  .login-card input:focus { outline: none; border-color: var(--gold); }
  .btn {
    display: inline-block; border: none; cursor: pointer; font-size: 14.5px;
    padding: 11px 20px; border-radius: 8px; font-weight: 600; transition: transform .08s ease, opacity .15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--navy-deep); }
  .btn-navy { background: var(--navy); color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--navy); color: var(--navy); }
  .btn-danger { background: #fbeae8; color: var(--pending); border: 1px solid #f0c3bd; }
  .btn-wide { width: 100%; }
  .login-error { color: var(--pending); font-size: 13px; min-height: 18px; margin-bottom: 6px; }

  #appScreen { min-height: 100vh; display: flex; flex-direction: column; }
  header.topbar {
    background: var(--navy); color: #fff; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border-bottom: 3px solid var(--gold);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand img { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--gold); }
  .brand-text h1 { font-size: 17px; color: #fff; }
  .brand-text .sub { font-size: 11px; color: var(--gold-light); letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; font-size: 13px; }
  .topbar-right .phone { color: var(--gold-light); }

  nav.tabs {
    display: flex; gap: 4px; background: #fff; padding: 0 16px; overflow-x: auto;
    border-bottom: 1px solid #e6e2d6;
  }
  nav.tabs button {
    background: none; border: none; padding: 14px 16px; font-size: 13.5px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap;
  }
  nav.tabs button.active { color: var(--navy); border-bottom-color: var(--gold); }

  main { flex: 1; padding: 20px; max-width: 1100px; width: 100%; margin: 0 auto; }
  .card {
    background: #fff; border-radius: var(--card-radius); padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #ece8db; margin-bottom: 18px;
  }
  .card h2 { font-size: 16.5px; color: var(--navy); margin-bottom: 14px; }
  .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 14px; margin-bottom: 18px; }
  .stat-card {
    background: var(--navy); color: #fff; border-radius: var(--card-radius); padding: 16px 18px;
    border-left: 4px solid var(--gold);
  }
  .stat-card .label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold-light); }
  .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

  label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  input, select { width: 100%; padding: 9px 10px; border: 1.3px solid #d8d3c4; border-radius: 7px; font-size: 14px; background: #fffdf9; }
  input:focus, select:focus { outline: none; border-color: var(--gold); }
  .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  @media (max-width: 700px) { .form-row { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid #eee6d8; }
  th { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:hover td { background: #fbf9f2; }

  .items-table th, .items-table td { padding: 6px; }
  .items-table input { padding: 7px 8px; font-size: 13.5px; }
  .del-row { background: none; border: none; color: var(--pending); cursor: pointer; font-size: 16px; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-paid { background: #e2f4ea; color: var(--paid); }
  .badge-pending { background: #fbe6e3; color: var(--pending); }
  .badge-partial { background: #fbf0d9; color: var(--partial); }

  .totals-row { display: flex; justify-content: flex-end; gap: 26px; margin-top: 10px; font-size: 14px; flex-wrap: wrap; }
  .totals-row b { color: var(--navy); }

  .search-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-bar input { max-width: 260px; }

  .empty-note { color: var(--muted); font-size: 13.5px; text-align: center; padding: 30px 10px; }

  .pending-customer { border: 1px solid #ece8db; border-radius: var(--card-radius); padding: 14px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
  .pending-customer .who { font-weight: 700; color: var(--navy); }
  .pending-customer .amt { color: var(--pending); font-weight: 700; font-size: 16px; }
  .pending-customer .meta { font-size: 12px; color: var(--muted); }

  .export-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; }
  .export-grid .btn { width: 100%; }

  .product-chip {
    display: inline-flex; align-items: center; background: #fbf8ee; border: 1px solid #e8dfc0;
    color: var(--navy); padding: 6px 10px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
  }

  .edit-banner {
    background: #fbf0d9; border: 1px solid #ecd8a0; color: #7a5c00;
    border-radius: var(--card-radius); padding: 12px 16px; margin-bottom: 16px;
    font-size: 13.5px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .edit-banner .btn { padding: 6px 14px; font-size: 12.5px; }

  footer.appfooter { text-align: center; font-size: 11.5px; color: var(--muted); padding: 14px; }

  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d8d3c4; border-radius: 4px; }
</style>
</head>

    <button data-tab="export" onclick="switchTab('export')">Export Reports</button>
  </nav>

  <main id="mainArea"></main>
  <footer class="appfooter">Shreehari Total Online Solution · 17/55 Chellas Complex, Near Canara Bank, Balamoreroad, Azhagiyapandiyapuram - 629851 · Created by Shreehari Chandrasekar</footer>
</div>

<script>
/* ---------------- STATE ---------------- */
const ADMIN_PASSWORD = "1977";
const STORAGE_KEY = "shreehari_bills_v1";
const PRODUCTS_KEY = "shreehari_products_v1";
let bills = [];
let products = [];
let currentTab = "dashboard";
let itemRowCount = 0;
let editingBillId = null;

/* ---------------- LOGIN ---------------- */
function tryLogin() {
  const val = document.getElementById("pwInput").value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
    loadBills();
  } else {
    document.getElementById("loginError").textContent = "Incorrect password. Try again.";
  }
}
document.getElementById("pwInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") tryLogin();
});

function logout() {
  document.getElementById("appScreen").classList.add("hidden");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("pwInput").value = "";
  document.getElementById("loginError").textContent = "";
}

/* ---------------- STORAGE ---------------- */
async function loadBills() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true);
    bills = res ? JSON.parse(res.value) : [];
  } catch (e) {
    bills = [];
  }
  try {
    const res2 = await window.storage.get(PRODUCTS_KEY, true);
    products = res2 ? JSON.parse(res2.value) : [];
  } catch (e) {
    products = [];
  }
  switchTab("dashboard");
}

async function saveBills() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(bills), true);
  } catch (e) {
    console.error("Save failed", e);
    alert("Could not save data. Please try again.");
  }
}

async function saveProducts() {
  try {
    await window.storage.set(PRODUCTS_KEY, JSON.stringify(products), true);
  } catch (e) {
    console.error("Save failed", e);
    alert("Could not save product. Please try again.");
  }
}

function addProduct() {
  const nameInput = document.getElementById("newProdName");
  const rateInput = document.getElementById("newProdRate");
  const name = nameInput.value.trim();
  const rate = parseFloat(rateInput.value) || 0;
  if (!name) {
    alert("Please enter a product/service name.");
    return;
  }
  products.push({ id: Date.now(), name: name, rate: rate });
  saveProducts().then(function () {
    nameInput.value = "";
    rateInput.value = "";
    refreshProductUI();
  });
}

function deleteProduct(id) {
  if (!confirm("Remove this saved product?")) return;
  products = products.filter(function (p) { return p.id !== id; });
  saveProducts().then(refreshProductUI);
}

function refreshProductUI() {
  const list = document.getElementById("productList");
  if (list) list.innerHTML = renderProductChips();
  document.querySelectorAll(".it-product").forEach(populateProductSelect);
}

function renderProductChips() {
  if (products.length === 0) {
    return '<div class="empty-note" style="padding:10px 0;">No saved products yet. Add one above.</div>';
  }
  return products.map(function (p) {
    return (
      '<span class="product-chip">' + p.name + " · " + fmt(p.rate) +
      '<button class="del-row" style="font-size:12px;margin-left:6px;" onclick="deleteProduct(' + p.id + ')">✕</button></span>'
    );
  }).join("");
}

function populateProductSelect(sel) {
  const current = sel.value;
  sel.innerHTML = '<option value="">-- choose saved product (optional) --</option>' +
    products.map(function (p) {
      return '<option value="' + p.id + '">' + p.name + " (" + fmt(p.rate) + ")</option>";
    }).join("");
  sel.value = current;
}

function onProductSelect(sel) {
  const row = sel.closest("tr");
  const p = products.find(function (pr) { return String(pr.id) === sel.value; });
  if (p) {
    row.querySelector(".it-name").value = p.name;
    row.querySelector(".it-rate").value = p.rate;
    recalcTotals();
  }
}

/* ---------------- HELPERS ---------------- */
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function fmt(n) {
  return "₹" + (Math.round(n * 100) / 100).toLocaleString("en-IN");
}
function statusOf(bill) {
  if (bill.balance <= 0) return "paid";
  if (bill.amountPaid > 0) return "partial";
  return "pending";
}
function badgeHTML(status) {
  const map = { paid: "Paid", partial: "Partial", pending: "Pending" };
  return '<span class="badge badge-' + status + '">' + map[status] + "</span>";
}
function within(dateStr, mode) {
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date();
  const today = new Date(now.toISOString().slice(0, 10) + "T00:00:00");
  if (mode === "daily") {
    return dateStr === todayISO();
  }
  if (mode === "weekly") {
    const diff = (today - d) / (1000 * 60 * 60 * 24);
    return diff >= 0 && diff < 7;
  }
  if (mode === "monthly") {
    return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
  }
  return true;
}

/* ---------------- TAB SWITCH ---------------- */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll("nav.tabs button").forEach(function (b) {
    b.classList.toggle("active", b.dataset.tab === tab);
  });
  const main = document.getElementById("mainArea");
  if (tab === "dashboard") main.innerHTML = renderDashboard();
  else if (tab === "newbill") { main.innerHTML = renderNewBill(); initNewBillForm(); }
  else if (tab === "allbills") main.innerHTML = renderAllBills();
  else if (tab === "pending") main.innerHTML = renderPending();
  else if (tab === "export") main.innerHTML = renderExport();
}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard() {
  const daily = bills.filter(function (b) { return within(b.date, "daily"); });
  const weekly = bills.filter(function (b) { return within(b.date, "weekly"); });
  const monthly = bills.filter(function (b) { return within(b.date, "monthly"); });
  const sum = function (arr) { return arr.reduce(function (s, b) { return s + b.total; }, 0); };
  const totalPending = bills.reduce(function (s, b) { return s + Math.max(b.balance, 0); }, 0);

  return (
    '<div class="grid-stats">' +
      statCard("Today's Sales", fmt(sum(daily)), daily.length + " bills") +
      statCard("This Week's Sales", fmt(sum(weekly)), weekly.length + " bills") +
      statCard("This Month's Sales", fmt(sum(monthly)), monthly.length + " bills") +
      statCard("Total Pending", fmt(totalPending), "from customers") +
    "</div>" +
    '<div class="card">' +
      "<h2>Recent Bills</h2>" +
      renderBillsTable(bills.slice().sort(function(a,b){return b.id - a.id;}).slice(0, 8), false) +
    "</div>"
  );
}
function statCard(label, value, sub) {
  return (
    '<div class="stat-card"><div class="label">' + label + '</div>' +
    '<div class="value">' + value + "</div>" +
    '<div class="label" style="margin-top:4px;opacity:.8;font-weight:400;text-transform:none;letter-spacing:0;">' + sub + "</div></div>"
  );
}

/* ---------------- NEW BILL ---------------- */
function renderNewBill() {
  const editing = editingBillId !== null;
  const banner = editing
    ? '<div class="edit-banner">✎ Editing an existing bill — saving will update this record instead of creating a new one. <button class="btn btn-outline" onclick="cancelEdit()">Cancel Edit</button></div>'
    : "";
  return (
    banner +
    '<div class="card">' +
      "<h2>Saved Products &amp; Services</h2>" +
      '<div class="form-row" style="grid-template-columns:2fr 1fr auto;align-items:end;">' +
        '<div><label>Product / Service Name</label><input id="newProdName" placeholder="e.g. Aadhar Update"></div>' +
        '<div><label>Rate (₹)</label><input type="number" id="newProdRate" min="0" placeholder="0"></div>' +
        '<div><button class="btn btn-navy" onclick="addProduct()">+ Save Product</button></div>' +
      "</div>" +
      '<div id="productList" style="display:flex;flex-wrap:wrap;gap:8px;">' + renderProductChips() + "</div>" +
    "</div>" +
    '<div class="card">' +
      "<h2>" + (editing ? "Edit Bill" : "Create New Bill") + "</h2>" +
      '<div class="form-row">' +
        '<div><label>Staff Name *</label><input id="f_staff" placeholder="e.g. Kumar"></div>' +
        '<div><label>Customer Name *</label><input id="f_customer" placeholder="e.g. Ravi"></div>' +
        '<div><label>Customer Phone *</label><input id="f_phone" placeholder="10-digit number"></div>' +
      "</div>" +
      '<table class="items-table" id="itemsTable">' +
        "<thead><tr><th>Saved Product</th><th>Product / Service</th><th>Rate (₹)</th><th>Qty</th><th>Amount</th><th></th></tr></thead>" +
        '<tbody id="itemsBody"></tbody>' +
      "</table>" +
      '<button class="btn btn-outline" style="margin-top:10px;" onclick="addItemRow()">+ Add Item</button>' +
      '<div class="totals-row">' +
        '<div>Total: <b id="totalDisplay">₹0</b></div>' +
        '<div style="min-width:200px;">' +
          "<label>Payment</label>" +
          '<div style="display:flex;gap:8px;margin-bottom:8px;">' +
            '<button type="button" class="btn btn-navy" id="btnMarkPaid" style="flex:1;background:var(--paid);" onclick="markPaid()">✓ Paid</button>' +
            '<button type="button" class="btn btn-navy" id="btnMarkPending" style="flex:1;background:var(--pending);" onclick="markPending()">Pending</button>' +
          "</div>" +
          '<label>Amount Paid</label><input type="number" id="f_paid" value="0" min="0" oninput="recalcTotals()">' +
        "</div>" +
        '<div>Balance: <b id="balanceDisplay">₹0</b></div>' +
      "</div>" +
      '<div style="margin-top:16px;"><button class="btn btn-gold" onclick="saveBill()">' + (editing ? "Update Bill" : "Save Bill") + "</button></div>" +
    "</div>"
  );
}
function initNewBillForm() {
  itemRowCount = 0;
  document.getElementById("itemsBody").innerHTML = "";
  if (editingBillId !== null) {
    const bill = bills.find(function (b) { return b.id === editingBillId; });
    if (bill) {
      document.getElementById("f_staff").value = bill.staffName;
      document.getElementById("f_customer").value = bill.customerName;
      document.getElementById("f_phone").value = bill.phone;
      bill.items.forEach(function (it) { addItemRow(it); });
      document.getElementById("f_paid").value = bill.amountPaid;
    } else {
      editingBillId = null;
      addItemRow();
    }
  } else {
    addItemRow();
  }
  recalcTotals();
}
function editBill(id) {
  editingBillId = id;
  switchTab("newbill");
}
function cancelEdit() {
  editingBillId = null;
  switchTab("newbill");
}
function addItemRow(prefill) {
  itemRowCount++;
  const id = "row" + itemRowCount;
  const tr = document.createElement("tr");
  tr.id = id;
  const pname = prefill ? escapeHtml(prefill.name) : "";
  const prate = prefill ? prefill.rate : 0;
  const pqty = prefill ? prefill.qty : 1;
  tr.innerHTML =
    '<td><select class="it-product" onchange="onProductSelect(this)" style="max-width:170px;"></select></td>' +
    '<td><input type="text" class="it-name" value="' + pname + '" placeholder="e.g. Pan Card Application"></td>' +
    '<td><input type="number" class="it-rate" min="0" value="' + prate + '" oninput="recalcTotals()" style="max-width:100px;"></td>' +
    '<td><input type="number" class="it-qty" min="1" value="' + pqty + '" oninput="recalcTotals()" style="max-width:80px;"></td>' +
    '<td class="it-amount">₹0</td>' +
    '<td><button class="del-row" onclick="removeItemRow(\'' + id + '\')">✕</button></td>';
  document.getElementById("itemsBody").appendChild(tr);
  populateProductSelect(tr.querySelector(".it-product"));
  recalcTotals();
}
function removeItemRow(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  recalcTotals();
}
function recalcTotals() {
  let total = 0;
  document.querySelectorAll("#itemsBody tr").forEach(function (row) {
    const rate = parseFloat(row.querySelector(".it-rate").value) || 0;
    const qty = parseFloat(row.querySelector(".it-qty").value) || 0;
    const amt = rate * qty;
    row.querySelector(".it-amount").textContent = fmt(amt);
    total += amt;
  });
  document.getElementById("totalDisplay").textContent = fmt(total);
  const paidInput = document.getElementById("f_paid");
  const paid = parseFloat(paidInput.value) || 0;
  const balance = total - paid;
  document.getElementById("balanceDisplay").textContent = fmt(balance < 0 ? 0 : balance);
  return { total: total, paid: paid, balance: balance };
}
function markPaid() {
  const totals = recalcTotals();
  document.getElementById("f_paid").value = totals.total;
  recalcTotals();
}
function markPending() {
  document.getElementById("f_paid").value = 0;
  recalcTotals();
}
function saveBill() {
  const staff = document.getElementById("f_staff").value.trim();
  const customer = document.getElementById("f_customer").value.trim();
  const phone = document.getElementById("f_phone").value.trim();
  if (!staff || !customer || !phone) {
    alert("Please fill Staff Name, Customer Name and Phone Number.");
    return;
  }
  const items = [];
  document.querySelectorAll("#itemsBody tr").forEach(function (row) {
    const name = row.querySelector(".it-name").value.trim();
    const rate = parseFloat(row.querySelector(".it-rate").value) || 0;
    const qty = parseFloat(row.querySelector(".it-qty").value) || 0;
    if (name) items.push({ name: name, rate: rate, qty: qty, amount: rate * qty });
  });
  if (items.length === 0) {
    alert("Please add at least one product/service.");
    return;
  }
  const totals = recalcTotals();
  const balance = totals.total - totals.paid < 0 ? 0 : totals.total - totals.paid;

  if (editingBillId !== null) {
    const idx = bills.findIndex(function (b) { return b.id === editingBillId; });
    if (idx !== -1) {
      bills[idx].staffName = staff;
      bills[idx].customerName = customer;
      bills[idx].phone = phone;
      bills[idx].items = items;
      bills[idx].total = totals.total;
      bills[idx].amountPaid = totals.paid;
      bills[idx].balance = balance;
    }
    editingBillId = null;
    saveBills().then(function () {
      alert("Bill updated for " + customer + ".");
      switchTab("allbills");
    });
    return;
  }

  const bill = {
    id: Date.now(),
    date: todayISO(),
    staffName: staff,
    customerName: customer,
    phone: phone,
    items: items,
    total: totals.total,
    amountPaid: totals.paid,
    balance: balance
  };
  bills.push(bill);
  saveBills().then(function () {
    alert("Bill saved for " + customer + " — Total " + fmt(bill.total));
    switchTab("newbill");
  });
}

/* ---------------- ALL BILLS (CREATED BILLS) ---------------- */
function renderBillsTable(list, showActions) {
  if (showActions === undefined) showActions = true;
  if (list.length === 0) return '<div class="empty-note">No bills yet.</div>';
  let rows = list.map(function (b) {
    const status = statusOf(b);
    return (
      "<tr>" +
      "<td>" + b.date + "</td>" +
      "<td>" + escapeHtml(b.staffName) + "</td>" +
      "<td>" + escapeHtml(b.customerName) + "</td>" +
      "<td>" + escapeHtml(b.phone) + "</td>" +
      "<td>" + fmt(b.total) + "</td>" +
      "<td>" + fmt(b.amountPaid) + "</td>" +
      "<td>" + fmt(b.balance) + "</td>" +
      "<td>" + badgeHTML(status) + "</td>" +
      (showActions
        ? '<td style="white-space:nowrap;">' +
          '<button class="del-row" title="View / Print e-bill" onclick="viewBill(' + b.id + ')">🧾</button> ' +
          '<button class="del-row" title="Download PDF bill" onclick="downloadBill(' + b.id + ')">⬇</button> ' +
          '<button class="del-row" title="Edit bill" onclick="editBill(' + b.id + ')">✎</button> ' +
          '<button class="btn btn-danger" style="padding:4px 10px;font-size:11.5px;" onclick="deleteBill(' + b.id + ')">Delete</button>' +
          "</td>"
        : "") +
      "</tr>"
    );
  }).join("");
  return (
    "<table><thead><tr><th>Date</th><th>Staff</th><th>Customer</th><th>Phone</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th>" +
    (showActions ? "<th>Actions</th>" : "") +
    "</tr></thead><tbody>" +
    rows +
    "</tbody></table>"
  );
}
function renderAllBills() {
  return (
    '<div class="card">' +
      "<h2>Created Bills</h2>" +
      '<div class="search-bar">' +
        '<input id="searchBox" placeholder="Search by customer name or phone..." oninput="filterAllBills()">' +
        '<button class="btn btn-navy" onclick="exportCreatedBillsView()">⬇ Export List (CSV)</button>' +
      "</div>" +
      '<div id="allBillsTable">' + renderBillsTable(bills.slice().sort(function(a,b){return b.id-a.id;})) + "</div>" +
    "</div>"
  );
}
function filterAllBills() {
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const filtered = bills.filter(function (b) {
    return b.customerName.toLowerCase().includes(q) || b.phone.includes(q);
  }).sort(function(a,b){return b.id-a.id;});
  document.getElementById("allBillsTable").innerHTML = renderBillsTable(filtered);
}
function deleteBill(id) {
  if (!confirm("Delete this bill? This cannot be undone.")) return;
  bills = bills.filter(function (b) { return b.id !== id; });
  saveBills().then(function () { switchTab(currentTab); });
}

/* ---------------- E-BILL (VIEW / DOWNLOAD) ---------------- */
function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s == null ? "" : String(s);
  return div.innerHTML;
}
function generateBillHTML(bill) {
  const logoSrc = document.querySelector(".brand img").src;
  const status = statusOf(bill);
  const statusLabel = { paid: "PAID", partial: "PARTIALLY PAID", pending: "PENDING" }[status];

      '<td style="text-align:right;">' + fmt(it.rate) + "</td>" +
      '<td style="text-align:center;">' + it.qty + "</td>" +

    ".head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #c9a227;padding-bottom:18px;margin-bottom:24px;}" +
    ".head img{width:70px;height:70px;border-radius:50%;border:2px solid #c9a227;}" +
    ".biz{text-align:right;font-size:12.5px;color:#555;line-height:1.5;}" +

    "17/55 Chellas Complex, Near Canara Bank<br>Balamoreroad, Azhagiyapandiyapuram - 629851<br>" +
    "📞 7373881236 / 9342551429 / 9597171614</div></div>" +
    '<div class="meta"><div><b>Bill No:</b> ' + billNo + "<br><b>Date:</b> " + bill.date +
    "<br><b>Staff:</b> " + escapeHtml(bill.staffName) + '</div><div style="text-align:right;">' +
    "<b>Billed To:</b><br>" + escapeHtml(bill.customerName) + "<br>" + escapeHtml(bill.phone) + "</div></div>" +
    "<table><thead><tr><th>#</th><th>Product / Service</th>" +
    '<th style="text-align:right;">Rate</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Amount</th></tr></thead>' +
    "<tbody>" + itemsRows + "</tbody></table>" +
    '<div class="totals"><div><span>Total</span><span>' + fmt(bill.total) + "</span></div>" +
    "<div><span>Amount Paid</span><span>" + fmt(bill.amountPaid) + "</span></div>" +
    '<div class="grand"><span>Balance Due</span><span>' + fmt(bill.balance) + "</span></div></div>" +
    '<div class="status ' + status + '">' + statusLabel + "</div>" +

    "Thank you for choosing SHREEHARI Total Online Solution.</div>" +

    '<button onclick="window.print()" style="padding:10px 20px;border:none;border-radius:8px;background:#c9a227;color:#0d2149;font-weight:700;cursor:pointer;">Print / Save as PDF</button>' +
    "</div></div></body></html>"
  );
}
function downloadBill(id) {
  const bill = bills.find(function (b) { return b.id === id; });
  if (!bill) return;
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert("The PDF tool is still loading (needs an internet connection the first time). Please wait a moment and try again, or use the 🧾 View button and print to PDF from there.");
    return;
  }
  const jsPDF = window.jspdf.jsPDF;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const navy = [13, 33, 73];
  const gold = [201, 162, 39];
  const muted = [107, 114, 128];
  const rs = function (n) { return "Rs. " + (Math.round(n * 100) / 100).toLocaleString("en-IN"); };

function viewBill(id) {
  const bill = bills.find(function (b) { return b.id === id; });
  if (!bill) return;
  const html = generateBillHTML(bill);
  const w = window.open("", "_blank");
  if (w) {
    w.document.write(html);
    w.document.close();
  } else {
    alert("Please allow pop-ups to view the e-bill, or use the download button instead.");
  }
}

/* ---------------- PENDING PAYMENTS ---------------- */
function renderPending() {
  const groups = {};
  bills.forEach(function (b) {
    if (b.balance > 0) {
      const key = b.phone;
      if (!groups[key]) groups[key] = { name: b.customerName, phone: b.phone, total: 0, count: 0 };
      groups[key].total += b.balance;
      groups[key].count += 1;
    }
  });
  const list = Object.values(groups).sort(function (a, b) { return b.total - a.total; });
  if (list.length === 0) {
    return '<div class="card"><h2>Pending Payments</h2><div class="empty-note">No pending balances. All customers are cleared. 🎉</div></div>';
  }
  const rows = list.map(function (g) {
    const safeName = g.name.replace(/'/g, "\\'");
    const safePhone = g.phone.replace(/'/g, "\\'");
    return (
      '<div class="pending-customer">' +
        "<div>" +
          '<div class="who">' + escapeHtml(g.name) + "</div>" +
          '<div class="meta">' + escapeHtml(g.phone) + " · " + g.count + " unpaid bill(s)</div>" +
        "</div>" +
        '<div class="amt">' + fmt(g.total) + "</div>" +
        '<div style="display:flex;gap:8px;">' +
          '<button class="btn btn-gold" onclick="sendReminder(\'' + safePhone + "', '" + safeName + "', " + g.total + ')">Send Reminder</button>' +
          '<button class="btn btn-danger" onclick="deletePendingGroup(\'' + safePhone + '\')">Delete</button>' +
        "</div>" +
      "</div>"
    );
  }).join("");
  return '<div class="card"><h2>Pending Payments</h2>' + rows + "</div>";
}
function deletePendingGroup(phone) {
  if (!confirm("Delete all pending bill records for this customer? This permanently removes those bills and cannot be undone.")) return;
  bills = bills.filter(function (b) { return !(b.phone === phone && b.balance > 0); });
  saveBills().then(function () { switchTab("pending"); });
}
function sendReminder(phone, name, amount) {
  let digits = phone.replace(/\D/g, "");
  if (digits.length === 10) digits = "91" + digits;
  const message =
    "Dear " + name + ", this is a reminder from SHREEHARI Total Online Solution. " +
    "Your pending balance is " + fmt(amount) + ". Kindly clear the payment at your earliest convenience. " +
    "For any queries, please contact us at 9342551429. Thank you for choosing SHREEHARI Total Online Solution.";
  const url = "https://wa.me/" + digits + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

/* ---------------- EXPORT ---------------- */
function renderExport() {
  return (
    '<div class="card">' +
      "<h2>Export Reports (CSV)</h2>" +
      '<p style="color:var(--muted);font-size:13.5px;margin-top:-6px;">Download a spreadsheet of your bills for a chosen period. Opens as a .csv file you can view in Excel or Google Sheets.</p>' +
      '<div class="export-grid">' +
        '<button class="btn btn-navy" onclick="exportCSV(\'daily\')">Export Today</button>' +
        '<button class="btn btn-navy" onclick="exportCSV(\'weekly\')">Export This Week</button>' +
        '<button class="btn btn-navy" onclick="exportCSV(\'monthly\')">Export This Month</button>' +
        '<button class="btn btn-outline" onclick="exportCSV(\'all\')">Export All Records</button>' +
      "</div>" +
    "</div>" +
    '<div class="card" style="border-color:#f0c3bd;">' +
      '<h2 style="color:var(--pending);">Danger Zone</h2>' +
      '<p style="color:var(--muted);font-size:13.5px;">This permanently deletes every saved bill so you can start fresh with a clean slate. Saved products are kept. This cannot be undone — export a backup first if you might need the old records.</p>' +
      '<button class="btn btn-danger" onclick="resetAllBills()">Delete All Bills &amp; Start Fresh</button>' +
    "</div>"
  );
}
function billsToCSV(list) {
  const header = ["Date", "Staff Name", "Customer Name", "Phone", "Product/Service", "Rate", "Qty", "Item Amount", "Bill Total", "Amount Paid", "Balance", "Status"];
  const lines = [header.join(",")];
  list.forEach(function (b) {
    const status = statusOf(b);
    b.items.forEach(function (it) {
      const row = [
        b.date, csvSafe(b.staffName), csvSafe(b.customerName), b.phone,
        csvSafe(it.name), it.rate, it.qty, it.amount,
        b.total, b.amountPaid, b.balance, status
      ];
      lines.push(row.join(","));
    });
  });
  return lines.join("\n");
}
function triggerCSVDownload(csvContent, filename) {
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCSV(mode) {
  const filtered = mode === "all" ? bills : bills.filter(function (b) { return within(b.date, mode); });
  if (filtered.length === 0) {
    alert("No bills found for this period.");
    return;
  }
  triggerCSVDownload(billsToCSV(filtered), "shreehari_bills_" + mode + "_" + todayISO() + ".csv");
}
function exportCreatedBillsView() {
  const searchBox = document.getElementById("searchBox");
  const q = searchBox ? searchBox.value.trim().toLowerCase() : "";
  const filtered = bills.filter(function (b) {
    return b.customerName.toLowerCase().includes(q) || b.phone.includes(q);
  }).sort(function (a, b) { return b.id - a.id; });
  if (filtered.length === 0) {
    alert("No bills to export.");
    return;
  }
  triggerCSVDownload(billsToCSV(filtered), "shreehari_created_bills_" + todayISO() + ".csv");
}
function resetAllBills() {
  if (!confirm("This will permanently delete ALL saved bills. This cannot be undone. Continue?")) return;
  if (!confirm("Are you absolutely sure? All bill history will be lost.")) return;
  bills = [];
  saveBills().then(function () {
    alert("All bills have been cleared. You can start fresh now.");
    switchTab("dashboard");
  });
}
function csvSafe(s) {
  if (s == null) return "";
  const str = String(s);
  if (str.includes(",") || str.includes('"') || str.includes("\n")) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}
